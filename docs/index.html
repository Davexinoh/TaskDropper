<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Intercom Desk</title><style>

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrapper{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:#111827;
border-radius:16px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1{
margin-top:0;
font-size:22px;
}

label{
font-size:13px;
opacity:.8;
margin-top:10px;
display:block;
}

select,textarea,input{
width:100%;
margin-top:6px;
padding:12px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
}

textarea{
min-height:70px;
resize:none;
}

button{
width:100%;
margin-top:14px;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

.result{
margin-top:14px;
color:#22c55e;
font-size:14px;
}

hr{
margin:24px 0;
border:0;
border-top:1px solid #2a2a2a;
}

</style></head><body><div class="wrapper"><div class="card"><h1>Intercom Desk</h1><label>Category</label>
<select id="category"></select>

<label>Sub Issue</label>
<select id="subIssue"></select>

<label>Description</label>

<textarea id="description"></textarea><button onclick="submitComplaint()">Submit Complaint</button>

<div id="result" class="result"></div><hr><label>Check Complaint Status</label>
<input id="ticketId" placeholder="Enter reference ID">

<button onclick="checkStatus()">Check Status</button>

<div id="statusResult" class="result"></div></div></div><script src="app.js"></script></body>
  </html>
