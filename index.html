<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intercom Desk — Structured Complaint Intake</title>

<meta name="description" content="Intercom Desk — a structured complaint intake interface built for the Intercom / Trac ecosystem.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  font-family: Inter, sans-serif;
  background:#0f0f1a;
  color:#f0f0ff;
  margin:0;
  padding:40px;
}

.container{
  max-width:700px;
  margin:auto;
  background:#1a1a2e;
  padding:30px;
  border-radius:12px;
}

h1{
  margin-top:0;
}

label{
  display:block;
  margin-top:20px;
  font-weight:600;
}

select, textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:6px;
  border:none;
  background:#0f0f1a;
  color:white;
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:6px;
  background:#6c5ce7;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#5848c2;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#0f0f1a;
  border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Intercom Desk</h1>

<p>
Structured complaint intake interface for the Intercom / Trac ecosystem.
</p>

<label>Complaint Category</label>

<select id="category">
<option>Loading categories...</option>
</select>

<label>Sub Issue</label>

<select id="subIssue">
<option>Select category first</option>
</select>

<label>Description</label>

<textarea id="description" rows="4" placeholder="Describe your issue"></textarea>

<button onclick="submitComplaint()">Submit Complaint</button>

<div class="result" id="result"></div>

</div>

<script>

async function loadCategories(){

  try{
    const res = await fetch("/api/categories")
    const data = await res.json()

    const select = document.getElementById("category")
    select.innerHTML=""

    data.forEach(c=>{
      const option=document.createElement("option")
      option.value=c
      option.textContent=c
      select.appendChild(option)
    })

  }catch(err){
    document.getElementById("category").innerHTML="<option>Error loading categories</option>"
  }

}

async function submitComplaint(){

  const category = document.getElementById("category").value
  const subIssue = document.getElementById("subIssue").value
  const description = document.getElementById("description").value

  const result = document.getElementById("result")

  result.innerHTML="Submitting..."

  try{

    const res = await fetch("/api/complaints",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        category,
        subIssue,
        description
      })
    })

    result.innerHTML="Complaint submitted successfully."

  }catch(err){

    result.innerHTML="Submission failed."

  }

}

loadCategories()

</script>

</body>
</html>
